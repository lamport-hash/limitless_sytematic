services:
  ui_strat:
    build:
      context: ..
      dockerfile: ui_strat/Dockerfile
    ports:
      - "8500:8500"
    volumes:
      - ../data:/app/data:ro
      - ./static/charts:/app/ui_strat/static/charts
      - ./templates:/app/ui_strat/templates
    environment:
      - BUNDLE_DIR=/app/data/bundle
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/api/files"]
      interval: 30s
      timeout: 10s
      retries: 3
