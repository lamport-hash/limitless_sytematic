<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Display Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid py-4">
        <h2>Configuration Display Test</h2>
        
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Test Configuration Display</h5>
                <div id="test-config"></div>
            </div>
        </div>
    </div>

    <script>
        // Test configuration display function
        function testConfigDisplay() {
            const testConfig = {
                listener_id: "listener_binance_rest",
                connector_type: "ccxt-rest-candle-binance", 
                connector_capacity: "all",
                selected_data_types: ["candles"],
                activated: true,
                exchanges: [
                    {
                        name: "binance",
                        symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
                    }
                ]
            };

            const configElement = document.getElementById('test-config');
            
            // Data types with badges
            const dataTypesBadges = testConfig.selected_data_types.map(type => {
                let badgeClass = 'bg-secondary';
                let icon = '';
                if (type === 'candles') {
                    badgeClass = 'bg-success';
                    icon = '<i class="bi bi-graph-up"></i> ';
                } else if (type === 'trades') {
                    badgeClass = 'bg-primary';
                    icon = '<i class="bi bi-arrow-left-right"></i> ';
                } else if (type === 'ob') {
                    badgeClass = 'bg-warning';
                    icon = '<i class="bi bi-list-ol"></i> ';
                }
                
                return `<span class="badge ${badgeClass} me-1">${icon}${type}</span>`;
            }).join('');

            // Connector with icon
            let connectorIcon = '';
            if (testConfig.connector_type.includes('ccxt')) {
                connectorIcon = '<i class="bi bi-link-45deg"></i> ';
            }
            
            // Exchanges display
            let exchangesHtml = '';
            testConfig.exchanges.forEach((exchange, index) => {
                const symbolsList = exchange.symbols.map(symbol => 
                    `<span class="badge bg-info me-1">${symbol}</span>`
                ).join('');
                
                exchangesHtml += `
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <strong class="text-primary">
                                <i class="bi bi-currency-exchange"></i> ${exchange.name}
                            </strong>
                            <span class="badge bg-info">${exchange.symbols.length} symbols</span>
                        </div>
                        <div class="p-2 bg-light rounded">
                            ${symbolsList}
                        </div>
                    </div>
                `;
            });

            configElement.innerHTML = `
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <h6 class="text-muted">Connector Information</h6>
                        <div class="mb-2">
                            <strong>Listener ID:</strong> ${testConfig.listener_id}
                        </div>
                        <div class="mb-2">
                            <strong>Connector Type:</strong> ${connectorIcon}${testConfig.connector_type}
                        </div>
                        <div class="mb-2">
                            <strong>Connector Capacity:</strong> ${testConfig.connector_capacity}
                        </div>
                        <div class="mb-2">
                            <strong>Selected Data Types:</strong> ${dataTypesBadges}
                        </div>
                        <div class="mb-2">
                            <strong>Status:</strong> 
                            <span class="badge bg-success">Active</span>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <h6 class="text-muted">Exchange & Symbol Configuration</h6>
                        ${exchangesHtml}
                    </div>
                </div>
            `;
        }

        // Test on page load
        document.addEventListener('DOMContentLoaded', testConfigDisplay);
    </script>
</body>
</html>
