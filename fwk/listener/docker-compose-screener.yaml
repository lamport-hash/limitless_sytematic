version: '3.8'

services:
  screener:
    build:
      context: ..
      dockerfile: listener/dockerfile_screener
    container_name: candle_screener
    ports:
      - "8004:8000"
    volumes:
      - ./config:/app/config:ro
      - ./docker_data/data/candles:/data/candles:ro
      - ./app/static:/app/app/static:ro
    environment:
      - CONFIG_PATH=/app/config/downloader.yaml
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    restart: unless-stopped
    networks:
      - candle_network
      - portal-network

networks:
  candle_network:
    external: true
  portal-network:
    name: portal-network
    external: true

